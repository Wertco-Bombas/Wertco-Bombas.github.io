<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Don — Sistema Completo</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="wrap">
    <header>
      <div class="brand">
        <span class="icon-user">👤</span>
        <h1>Don</h1>
      </div>
      <div id="headerUser" style="display:none;align-items:center;gap:10px">
        <div class="small" id="headerName"></div>
        <div class="small" id="headerRole" style="font-weight:700;color:var(--accent)"></div>
        <button class="btn ghost" id="btnLogout">Sair</button>
      </div>
    </header>

    <!-- LOGIN -->
    <div id="loginScreen" class="login-card">
      <div class="card login-card">
        <h2 class="login-title">Entrar</h2>
        <div class="field"><label class="small">Usuário</label><input id="loginUser" type="text"></div>
        <div class="field"><label class="small">Senha</label><input id="loginPass" type="password"></div>
        <button class="btn full" id="btnLogin">Entrar</button>
      </div>
    </div>

    <!-- DASHBOARD -->
    <div id="dashboard" style="display:none">
      <nav class="top-menu">
        <div class="menu-item" data-target="page-kb">Base de conhecimento</div>
        <div class="menu-item" data-target="page-user">Usuário</div>
        <div class="menu-item" data-target="page-training">Treinamento</div>
        <div class="menu-item" data-target="page-audit">Auditoria</div>
      </nav>

      <div class="search-bar">
        <input type="search" placeholder="Pesquisar títulos, descrições, categorias, comentários e nomes de arquivos..." id="searchAll">
        <select id="filterCategory"><option value="">Todas as categorias</option></select>
        <button class="btn">Novo Tópico</button>
        <button class="btn">Nova Categoria</button>
        <button class="btn warn">Excluir Categoria</button>
      </div>

      <main class="layout">
        <section id="page-kb" class="page active">
          <div id="topicsList"></div>
        </section>
        <section id="page-user" class="page"><div id="usersList"></div></section>
        <section id="page-training" class="page"><div id="trainingUpload"></div><div id="trainingFiles"></div></section>
        <section id="page-audit" class="page"><div id="auditLog"></div></section>
      </main>

      <footer class="small">Protótipo local — dados salvos no navegador (localStorage).</footer>
    </div>
  </div>

  <div id="popupContainer"></div>
  <script src="script.js"></script>
</body>
</html>
