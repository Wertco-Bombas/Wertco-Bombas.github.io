<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Don — Sistema Completo</title>
  <!-- Importa o CSS externo -->
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="wrap">
    <header>
      <h1>Don</h1>
      <div id="headerUser"></div>
    </header>

    <nav>
      <button onclick="showSection('page-kb')">Base</button>
      <button onclick="showSection('page-training')">Treinamento</button>
      <button onclick="showSection('page-audit')">Auditoria</button>
      <button onclick="showSection('page-user')">Usuários</button>
    </nav>

    <section id="page-kb" class="page active">
      <h2>Base de Conhecimento</h2>
      <button onclick="newTopic()">Novo Tópico</button>
      <div id="topicsList"></div>
    </section>

    <section id="page-training" class="page">
      <h2>Treinamento</h2>
      <div id="trainingUpload"></div>
      <div id="trainingFiles"></div>
    </section>

    <section id="page-audit" class="page">
      <h2>Auditoria</h2>
      <div id="auditLog"></div>
    </section>

    <section id="page-user" class="page">
      <h2>Usuários</h2>
      <div id="usersList"></div>
    </section>
  </div>

  <!-- Importa o JS externo -->
  <script src="script.js"></script>
</body>
</html>
