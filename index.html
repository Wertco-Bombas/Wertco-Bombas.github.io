<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Don — Sistema Completo</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="wrap">
    <header>
      <div class="brand">
        <h1>Don</h1>
      </div>
      <div id="headerUser" style="display:none;align-items:center;gap:10px">
        <div class="small" id="headerName"></div>
        <div class="small" id="headerRole" style="font-weight:700;color:var(--accent)"></div>
        <button class="btn ghost" id="btnLogout">Sair</button>
      </div>
    </header>

    <!-- LOGIN -->
    <div id="loginScreen" class="login-card">
      <div class="card login-card">
        <h2 style="margin:0 0 8px;color:var(--accent)">Entrar</h2>
        <div class="field"><label class="small">Usuário</label><input id="loginUser" type="text"></div>
        <div class="field"><label class="small">Senha</label><input id="loginPass" type="password"></div>
        <div style="display:flex;gap:8px;margin-top:12px">
          <button class="btn" id="btnLogin">Entrar</button>
        </div>
      </div>
    </div>

    <!-- DASHBOARD -->
    <div id="dashboard" style="display:none">
      <nav class="top-menu">
        <div class="menu-item" data-target="page-kb">Base de conhecimento</div>
        <div class="menu-item" data-target="page-user">Usuário</div>
        <div class="menu-item" data-target="page-training">Treinamento</div>
        <div class="menu-item" data-target="page-audit">Auditoria</div>
      </nav>

      <main class="layout">
        <section id="page-kb" class="page active">
          <h2>Base de Conhecimento</h2>
          <button class="btn" id="btnNewTopic">Novo Tópico</button>
          <div id="topicsList"></div>
        </section>

        <section id="page-user" class="page">
          <h2>Usuários</h2>
          <div id="usersList"></div>
        </section>

        <section id="page-training" class="page">
          <h2>Treinamento</h2>
          <div id="trainingUpload"></div>
          <div id="trainingFiles"></div>
        </section>

        <section id="page-audit" class="page">
          <h2>Auditoria</h2>
          <div id="auditLog"></div>
        </section>
      </main>

      <footer class="small">Protótipo local — dados salvos no navegador (localStorage).</footer>
    </div>
  </div>

  <div id="popupContainer"></div>
  <script src="script.js"></script>
</body>
</html>
