<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Bom dia personalizado</title>

  <style>
    body {
      font-family: Arial, Helvetica, sans-serif;
      background: linear-gradient(135deg, #4facfe, #00f2fe);
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .container {
      background: white;
      padding: 25px;
      border-radius: 12px;
      width: 320px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
      text-align: center;
    }

    h1 {
      margin-bottom: 15px;
      font-size: 20px;
    }

    input {
      width: 100%;
      padding: 10px;
      margin: 8px 0;
      border: 1px solid #ccc;
      border-radius: 8px;
      outline: none;
    }

    button {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      border: none;
      border-radius: 8px;
      background: #4facfe;
      color: white;
      font-weight: bold;
      cursor: pointer;
    }

    button:hover {
      background: #2196f3;
    }

    .resultado {
      margin-top: 15px;
      font-size: 16px;
    }

    a {
      color: #2196f3;
      word-break: break-all;
    }
  </style>
</head>

<body>

  <div class="container">
    <h1>Bem-vindo 👋</h1>

    <input type="text" id="nome" placeholder="Digite seu nome" />
    <input type="text" id="site" placeholder="Digite seu site (opcional)" />

    <button onclick="gerarMensagem()">Enviar</button>

    <div class="resultado" id="resultado"></div>
  </div>

  <script>
    function gerarMensagem() {
      const nome = document.getElementById("nome").value.trim();
      const site = document.getElementById("site").value.trim();
      const resultado = document.getElementById("resultado");

      if (!nome) {
        resultado.innerHTML = "Por favor, digite seu nome.";
        return;
      }

      let mensagem = `🌞 Bom dia, <strong>${nome}</strong>!`;

      if (site) {
        mensagem += `<br><br>Seu site: <a href="${site}" target="_blank">${site}</a>`;
      }

      resultado.innerHTML = mensagem;
    }
  </script>

</body>
</html>
