<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Don — Sistema Completo</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="wrap">
    <header>
      <div class="brand">
        <span class="brand-icon" aria-hidden="true">👤</span>
        <h1>Don</h1>
      </div>

      <div id="headerUser" class="header-user" style="display:none">
        <div class="small" id="headerName"></div>
        <div class="small role" id="headerRole"></div>
        <button class="btn ghost" id="btnLogout">Sair</button>
      </div>
    </header>

    <!-- LOGIN -->
    <div id="loginScreen" class="login-card">
      <div class="card login-card-inner" role="form" aria-labelledby="loginTitle">
        <h2 id="loginTitle" class="login-title">Entrar</h2>

        <label class="small" for="loginUser">Usuário</label>
        <input id="loginUser" type="text" autocomplete="username" inputmode="text" />

        <label class="small" for="loginPass">Senha</label>
        <input id="loginPass" type="password" autocomplete="current-password" />

        <button class="btn full" id="btnLogin" aria-label="Entrar">Entrar</button>
      </div>
    </div>

    <!-- DASHBOARD -->
    <div id="dashboard" style="display:none">
      <nav class="top-menu" role="navigation" aria-label="Menu principal">
        <div class="menu-item" data-target="page-kb">Base de conhecimento</div>
        <div class="menu-item" data-target="page-user">Usuário</div>
        <div class="menu-item" data-target="page-training">Treinamento</div>
        <div class="menu-item" data-target="page-audit">Auditoria</div>
      </nav>

      <main class="layout" role="main">
        <section id="page-kb" class="page active" aria-labelledby="kbTitle">
          <h2 id="kbTitle" class="section-title">Base de Conhecimento</h2>

          <!-- Search and actions only inside KB section -->
          <div id="kbSearchBar" class="search-bar">
            <input id="searchAll" type="search" placeholder="Pesquisar títulos, descrições, categorias, comentários e nomes de arquivos..." aria-label="Pesquisar">
            <select id="filterCategory" aria-label="Filtrar por categoria"><option value="">Todas as categorias</option></select>
            <div class="search-actions">
              <button class="btn" id="btnNewTopic">Novo Tópico</button>
              <button class="btn" id="btnNewCategory">Nova Categoria</button>
              <button class="btn warn" id="btnDeleteCategoryTop">Excluir Categoria</button>
            </div>
          </div>

          <div id="topicsList" class="topics-list"></div>
        </section>

        <section id="page-user" class="page" aria-labelledby="userTitle">
          <h2 id="userTitle" class="section-title">Usuários</h2>
          <div class="card">
            <div id="userControls" class="user-controls">
              <input id="newName" type="text" placeholder="Nome completo">
              <input id="newLogin" type="text" placeholder="Usuário (login)">
              <select id="newRole"></select>
              <input id="newPass" type="password" placeholder="Senha">
              <button class="btn" id="btnCreateUser">Criar usuário</button>
            </div>
            <div id="usersList" class="users-list"></div>
          </div>
        </section>

        <section id="page-training" class="page" aria-labelledby="trainingTitle">
          <h2 id="trainingTitle" class="section-title">Treinamento</h2>
          <div class="card">
            <div id="trainingUpload"></div>
            <div id="trainingFiles" class="training-files"></div>
          </div>
        </section>

        <section id="page-audit" class="page" aria-labelledby="auditTitle">
          <h2 id="auditTitle" class="section-title">Auditoria</h2>
          <div class="card">
            <div id="auditLog" class="audit-list"></div>
          </div>
        </section>
      </main>

      <footer class="small">Protótipo local — dados salvos no navegador (localStorage).</footer>
    </div>
  </div>

  <!-- Modais / telas para KB actions -->
  <!-- Modais / telas para KB actions -->
  <div id="modalOverlay" class="modal-overlay" style="display:none" aria-hidden="true">
    <div id="modalBox" class="modal-box" role="dialog" aria-modal="true"></div>
  </div>

  <div id="pendingPanel" class="pending-panel" style="display:none" aria-live="polite">
    <div class="pending-header">
      <strong>Comentários pendentes</strong>
      <button class="btn ghost" id="btnClosePending">Fechar</button>
    </div>
    <div id="pendingList" class="pending-list"></div>
  </div>

  <div id="popupContainer" aria-hidden="true"></div>

  <script src="script.js"></script>
</body>
</html>
